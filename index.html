<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pidamos \u00b7 Jaquematte \u2014 Marketing Latinoam\u00e9rica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --nav-h: 60px;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', sans-serif;
  --a-ink:#0d0d0b; --a-paper:#f5f2ec; --a-accent:#c8a96e; --a-muted:#8a8880; --a-line:rgba(13,13,11,0.11);
  --b-ink:#0a0a14; --b-paper:#f0f0f8; --b-accent:#4f46e5; --b-muted:#7878a0; --b-line:rgba(10,10,20,0.11);
  --ink:var(--a-ink); --paper:var(--a-paper); --accent:var(--a-accent); --muted:var(--a-muted); --line:var(--a-line);
}
body { background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden; transition:background .5s,color .5s; }
body.brand-b { --ink:var(--b-ink); --paper:var(--b-paper); --accent:var(--b-accent); --muted:var(--b-muted); --line:var(--b-line); }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
::selection{background:var(--accent);color:var(--paper);}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--accent);}

/* \u2500\u2500 NAV \u2500\u2500 */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:var(--nav-h);
  display:grid; grid-template-columns:auto 1fr auto auto;
  align-items:center; gap:20px;
  padding:0 20px;
  background:rgba(245,242,236,.97);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  transition:box-shadow .3s, background .5s;
}
body.brand-b .nav{background:rgba(240,240,248,.97);}
.nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.06);}

.brand-switcher{display:flex;align-items:center;border:1px solid var(--line);border-radius:100px;overflow:hidden;flex-shrink:0;}
.brand-btn{padding:5px 12px;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;font-family:var(--sans);border:none;cursor:pointer;background:transparent;color:var(--muted);transition:background .3s,color .3s;white-space:nowrap;}
.brand-btn.active{background:var(--ink);color:var(--paper);}

.nav-links{display:none;gap:22px;list-style:none;justify-content:center;}
.nav-links a{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);text-decoration:none;font-weight:500;transition:color .2s;white-space:nowrap;cursor:pointer;}
.nav-links a:hover{color:var(--ink);}

.nav-cta{display:none;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--accent);padding-bottom:1px;white-space:nowrap;transition:color .2s;cursor:pointer;}
.nav-cta:hover{color:var(--accent);}

.nav-hamburger{display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;justify-self:end;z-index:201;}
.nav-hamburger span{display:block;width:24px;height:1.5px;background:var(--ink);transition:transform .3s,opacity .2s,background .5s;}
.nav-hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

/* drawer */
.nav-drawer{
  display:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:199;
  flex-direction:column;
  justify-content:center;
  padding:calc(var(--nav-h) + 24px) 32px 40px;
  background:#f5f2ec;
}
body.brand-b .nav-drawer{ background:#0a0a24; }
.nav-drawer.open{display:flex;}

.nav-drawer a{
  font-family:var(--serif);
  font-size:clamp(28px,8vw,42px);
  font-weight:300;
  letter-spacing:-.01em;
  color:#0d0d0b;
  text-decoration:none;
  padding:10px 0;
  border-bottom:1px solid rgba(13,13,11,.1);
  line-height:1.1;
  transition:color .2s, padding-left .2s;
  cursor:pointer;
}
.nav-drawer a:hover{ color:#c8a96e; padding-left:8px; }
.nav-drawer a:last-child{ border-bottom:none; font-style:italic; color:#c8a96e; }

body.brand-b .nav-drawer a{ color:rgba(240,240,248,.7); border-bottom-color:rgba(240,240,248,.08); }
body.brand-b .nav-drawer a:hover{ color:#f0f0f8; }
body.brand-b .nav-drawer a:last-child{ color:#4f46e5; }

/* \u2500\u2500 BRAND PAGES \u2500\u2500 */
.brand-page{ display:none; }
.brand-page.active{ display:block; }

/* \u2500\u2500 HERO \u2500\u2500 */
.hero{margin-top:var(--nav-h);}
.hero-visual{width:100%;height:62vw;min-height:240px;max-height:400px;position:relative;overflow:hidden;}
.vis-panel{position:absolute;inset:0;}
.vis-pidamos{background:linear-gradient(160deg,#1a2744 0%,#2d1b0e 40%,#0d0d0b 100%);}
.vis-pidamos::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 80% 30%,rgba(200,169,110,.22) 0%,transparent 60%);}
.vis-pidamos::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(13,13,11,.85) 0%,transparent 100%);}
.vis-jaquematte{background:linear-gradient(155deg,#0a0a24 0%,#1a1a5c 35%,#2d2d8a 65%,#0a0a14 100%);}
.vis-jaquematte::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 70% 30%,rgba(79,70,229,.35) 0%,transparent 55%),radial-gradient(ellipse 40% 40% at 20% 70%,rgba(79,70,229,.15) 0%,transparent 55%);}
.vis-jaquematte::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(79,70,229,.06) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(79,70,229,.06) 40px);}

.hero-badge{position:absolute;bottom:16px;right:16px;z-index:2;background:var(--paper);padding:12px 16px;transition:background .5s;}
.hero-badge-num{font-family:var(--serif);font-size:34px;font-weight:300;line-height:1;color:var(--ink);}
.hero-badge-num i{font-style:italic;color:var(--accent);}
.hero-badge-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.hero-body{padding:40px 20px 52px;}
.hero-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:16px;}
.hero-title{font-family:var(--serif);font-size:clamp(46px,7vw,108px);font-weight:300;line-height:.96;letter-spacing:-.02em;margin-bottom:22px;color:var(--ink);overflow:hidden;}
.hero-title i{font-style:italic;color:var(--accent);}
.hero-desc{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:32px;max-width:480px;}
.hero-actions{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:500;text-decoration:none;transition:all .22s;cursor:pointer;border:none;}
.btn-fill{background:var(--ink);color:var(--paper);padding:14px 24px;}
.btn-fill:hover{background:var(--accent);}
.btn-text{color:var(--muted);padding:2px 0;border-bottom:1px solid transparent;}
.btn-text:hover{color:var(--ink);border-color:var(--line);}
.btn svg{flex-shrink:0;transition:transform .2s;}
.btn:hover svg{transform:translateX(3px);}

/* \u2500\u2500 TICKER \u2500\u2500 */
.ticker{overflow:hidden;padding:13px 0;}
.ticker-a{background:#0d0d0b;}
.ticker-b{background:#0a0a24;}
.ticker-track{display:flex;width:max-content;animation:ticker-scroll 24s linear infinite;}
.ticker-item{display:flex;align-items:center;gap:20px;padding:0 36px;white-space:nowrap;font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:500;color:rgba(255,255,255,.4);}
.ticker-item s{color:var(--accent);text-decoration:none;}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:var(--accent);flex-shrink:0;}

/* \u2500\u2500 STATS \u2500\u2500 */
.stats{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line);}
.stat{padding:36px 20px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
.stat:nth-child(2n){border-right:none;}
.stat:nth-child(3),.stat:nth-child(4){border-bottom:none;}
.stat-num{font-family:var(--serif);font-size:clamp(44px,11vw,96px);font-weight:300;line-height:1;color:var(--ink);}
.stat-num sup{font-size:.38em;color:var(--accent);vertical-align:super;}
.stat-label{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;}

/* \u2500\u2500 SECTION HEADER \u2500\u2500 */
.sh{padding:0 20px;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-end;}
.sh-tag{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:6px;}
.sh-title{font-family:var(--serif);font-size:clamp(30px,8vw,80px);font-weight:300;line-height:1.0;color:var(--ink);}
.sh-title i{font-style:italic;}
.sh-num{font-family:var(--serif);font-size:clamp(48px,14vw,120px);font-weight:300;color:rgba(13,13,11,.08);line-height:1;}

/* \u2500\u2500 SERVICES \u2500\u2500 */
.services{padding:56px 0;}
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);}
.svc{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:3/4;}
.svc-photo{position:absolute;inset:0;transition:transform .6s ease;}
.svc:hover .svc-photo{transform:scale(1.05);}
.sp1{background:linear-gradient(145deg,#1a2744,#2d4a8a,#0d1a3a);}
.sp2{background:linear-gradient(145deg,#2d1b0e,#5c3a1e,#1a0e05);}
.sp3{background:linear-gradient(145deg,#0d2d1e,#1a5c3a,#051a0e);}
.sp
